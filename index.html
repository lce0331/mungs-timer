<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>멍’s 타이머</title>

<style>
body {
  background: #ffd6e7;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

#timer {
  font-size: 50px;
  margin: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

select, input {
  padding: 8px;
  border-radius: 8px;
}

ul {
  list-style: none;
  padding: 0;
}

.section {
  margin-top: 25px;
}
</style>
</head>

<body>

<h1>🐶 멍’s 타이머</h1>

<select id="subject">
  <option>국어</option>
  <option>수학</option>
  <option>영어</option>
  <option>지구과학</option>
  <option>생명과학</option>
  <option>한국사</option>
  <option>인강</option>
  <option>플래너 작성</option>
</select>

<div id="timer">00:00:00</div>

<button onclick="start()">시작</button>
<button onclick="stop()">정지</button>
<button onclick="reset()">리셋</button>

<div class="section">
  <input type="date" id="datePicker">
</div>

<div class="section">
  <h2>📊 공부 기록</h2>
  <ul id="log"></ul>
</div>

<div class="section">
  <h2>총 공부시간: <span id="total">0</span>분</h2>
</div>

<script>
let startTime = null;
let timer = null;
let elapsed = 0;

// 오늘 날짜
function getToday() {
  return new Date().toISOString().split('T')[0];
}

// 데이터 불러오기
let data = JSON.parse(localStorage.getItem("studyData")) || {};

let selectedDate = getToday();
document.getElementById("datePicker").value = selectedDate;

// ⭐ 날짜 바뀔 때도 렌더
document.getElementById("datePicker").addEventListener("change", (e) => {
  selectedDate = e.target.value;
  renderAll();
});

renderAll();

function start() {
  if (timer) return;

  startTime = Date.now() - elapsed;

  timer = setInterval(() => {
    elapsed = Date.now() - startTime;
    updateTimer();
  }, 1000);
}

function stop() {
  if (!timer) return;

  clearInterval(timer);
  timer = null;

  let endTime = Date.now();
  let duration = Math.floor(elapsed / 60000);

  // ⭐ 이거 때문에 기록 안 보였던거임 (삭제함)
  // if (duration < 1) return;

  let subject = document.getElementById("subject").value;

  let record = {
    subject,
    start: new Date(startTime).toLocaleTimeString(),
    end: new Date(endTime).toLocaleTimeString(),
    duration
  };

  if (!data[selectedDate]) data[selectedDate] = [];
  data[selectedDate].push(record);

  localStorage.setItem("studyData", JSON.stringify(data));

  elapsed = 0;
  updateTimer();

  renderAll();
}

function reset() {
  clearInterval(timer);
  timer = null;
  elapsed = 0;
  updateTimer();
}

function updateTimer() {
  let sec = Math.floor(elapsed / 1000);
  let h = String(Math.floor(sec / 3600)).padStart(2, '0');
  let m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  let s = String(sec % 60).padStart(2, '0');

  document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

function renderAll() {
  renderLog();
  updateTotal();
}

function renderLog() {
  let log = document.getElementById("log");
  log.innerHTML = "";

  let list = data[selectedDate] || [];

  list.forEach(r => {
    let li = document.createElement("li");
    li.innerText = `${r.start} ~ ${r.end} | ${r.subject} (${r.duration}분)`;
    log.appendChild(li);
  });
}

function updateTotal() {
  let total = 0;
  (data[selectedDate] || []).forEach(r => total += r.duration);
  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>

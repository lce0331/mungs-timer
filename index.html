<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>멍’s 타이머</title>

<style>
body {
  background: #ffd6e7;
  font-family: sans-serif;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#timer {
  font-size: 50px;
  margin: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

#log {
  margin-top: 30px;
  list-style: none;
  padding: 0;
}

.date-group {
  margin-top: 20px;
  font-weight: bold;
}

li {
  margin: 5px 0;
}
</style>
</head>

<body>

<h1>🐶 멍’s 타이머</h1>

<select id="subject">
  <option>국어</option>
  <option>수학</option>
  <option>영어</option>
  <option>지구과학</option>
  <option>생명과학</option>
  <option>한국사</option>
  <option>인강</option>
  <option>플래너 작성</option>
</select>

<div id="timer">00:00:00</div>

<button onclick="start()">시작</button>
<button onclick="pause()">일시정지</button>
<button onclick="stop()">종료(기록)</button>
<button onclick="reset()">리셋</button>

<h2>📊 공부 기록</h2>
<ul id="log"></ul>

<h2>총 공부시간: <span id="total">0</span>분</h2>

<script>
let startTime;
let timer;
let elapsed = 0;
let isRunning = false;

let records = JSON.parse(localStorage.getItem("studyRecords")) || [];

renderLog();
updateTotal();

function getDateString(time) {
  let d = new Date(time);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function start() {
  if (isRunning) return;

  isRunning = true;
  startTime = Date.now() - elapsed;

  timer = setInterval(() => {
    elapsed = Date.now() - startTime;
    updateTimer();
  }, 1000);
}

function pause() {
  clearInterval(timer);
  isRunning = false;
}

function stop() {
  clearInterval(timer);
  isRunning = false;

  let endTime = Date.now();
  let duration = Math.floor((endTime - startTime) / 60000);

  if (duration <= 0) {
    elapsed = 0;
    updateTimer();
    return;
  }

  let subject = document.getElementById("subject").value;

  let record = {
    subject,
    start: new Date(startTime).toLocaleTimeString(),
    end: new Date(endTime).toLocaleTimeString(),
    duration,
    date: getDateString(startTime)
  };

  records.push(record);
  localStorage.setItem("studyRecords", JSON.stringify(records));

  renderLog();
  updateTotal();

  elapsed = 0;
  updateTimer();
}

function reset() {
  clearInterval(timer);
  isRunning = false;
  elapsed = 0;
  updateTimer();
}

function updateTimer() {
  let sec = Math.floor(elapsed / 1000);
  let h = String(Math.floor(sec / 3600)).padStart(2, '0');
  let m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  let s = String(sec % 60).padStart(2, '0');

  document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

function renderLog() {
  let log = document.getElementById("log");
  log.innerHTML = "";

  let grouped = {};

  records.forEach(r => {
    if (!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  Object.keys(grouped).sort().reverse().forEach(date => {
    let dateLi = document.createElement("li");
    dateLi.className = "date-group";
    dateLi.innerText = `📅 ${date}`;
    log.appendChild(dateLi);

    grouped[date].forEach(r => {
      let li = document.createElement("li");
      li.innerText = `${r.start} ~ ${r.end} | ${r.subject} (${r.duration}분)`;
      log.appendChild(li);
    });
  });
}

function updateTotal() {
  let total = 0;
  records.forEach(r => total += r.duration);
  document.getElementById("total").innerText = total;
}
</script>

</body>
</html>

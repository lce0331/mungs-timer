<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>멍’s 타이머</title>

<style>
body {
  background: #ffd6e7;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 { margin-top: 10px; }

#timer {
  font-size: 50px;
  margin: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

select {
  padding: 8px;
  border-radius: 8px;
}

#log {
  margin-top: 20px;
  list-style: none;
  padding: 0;
}

li { margin: 5px 0; }

.section {
  margin-top: 30px;
}

canvas {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🐶 멍’s 타이머</h1>

<select id="subject">
  <option>국어</option>
  <option>수학</option>
  <option>영어</option>
  <option>지구과학</option>
  <option>생명과학</option>
  <option>한국사</option>
  <option>인강</option>
  <option>플래너 작성</option>
</select>

<div id="timer">00:00:00</div>

<button onclick="start()">시작</button>
<button onclick="stop()">정지</button>
<button onclick="reset()">리셋</button>
<button onclick="clearAll()">전체삭제</button>

<div class="section">
  <h2>📊 오늘 공부 기록</h2>
  <ul id="log"></ul>
</div>

<div class="section">
  <h2>총 공부시간: <span id="total">0</span>분</h2>
</div>

<div class="section">
  <h2>📈 과목별 공부시간</h2>
  <canvas id="chart" width="300" height="300"></canvas>
</div>

<script>
let startTime;
let timer;
let elapsed = 0;

// 날짜 문자열 (YYYY-MM-DD)
function getToday() {
  let d = new Date();
  return d.toISOString().split('T')[0];
}

// 저장 구조: {날짜: [기록들]}
let data = JSON.parse(localStorage.getItem("studyData")) || {};
let today = getToday();

if (!data[today]) data[today] = [];

renderAll();

function start() {
  if (timer) return;

  startTime = Date.now() - elapsed;

  timer = setInterval(() => {
    elapsed = Date.now() - startTime;
    updateTimer();
  }, 1000);
}

function stop() {
  clearInterval(timer);
  timer = null;

  let endTime = Date.now();
  let duration = Math.floor((endTime - startTime) / 60000);

  if (duration <= 0) {
    elapsed = 0;
    updateTimer();
    return;
  }

  let subject = document.getElementById("subject").value;

  let record = {
    subject,
    start: new Date(startTime).toLocaleTimeString(),
    end: new Date(endTime).toLocaleTimeString(),
    duration
  };

  data[today].push(record);

  localStorage.setItem("studyData", JSON.stringify(data));

  elapsed = 0;
  updateTimer();

  renderAll();
}

function reset() {
  clearInterval(timer);
  timer = null;
  elapsed = 0;
  updateTimer();
}

function clearAll() {
  if (confirm("오늘 기록 삭제할거임?")) {
    data[today] = [];
    localStorage.setItem("studyData", JSON.stringify(data));
    renderAll();
  }
}

function updateTimer() {
  let sec = Math.floor(elapsed / 1000);
  let h = String(Math.floor(sec / 3600)).padStart(2, '0');
  let m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  let s = String(sec % 60).padStart(2, '0');

  document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

function renderAll() {
  renderLog();
  updateTotal();
  drawChart();
}

function renderLog() {
  let log = document.getElementById("log");
  log.innerHTML = "";

  (data[today] || []).forEach(r => {
    let li = document.createElement("li");
    li.innerText = `${r.start} ~ ${r.end} | ${r.subject} (${r.duration}분)`;
    log.appendChild(li);
  });
}

function updateTotal() {
  let total = 0;
  (data[today] || []).forEach(r => total += r.duration);
  document.getElementById("total").innerText = total;
}

function drawChart() {
  let canvas = document.getElementById("chart");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let subjectTime = {};

  (data[today] || []).forEach(r => {
    subjectTime[r.subject] = (subjectTime[r.subject] || 0) + r.duration;
  });

  let values = Object.values(subjectTime);
  let labels = Object.keys(subjectTime);

  let total = values.reduce((a, b) => a + b, 0);
  if (total === 0) return;

  let startAngle = 0;

  values.forEach((val, i) => {
    let sliceAngle = (val / total) * 2 * Math.PI;

    ctx.beginPath();
    ctx.moveTo(150, 150);
    ctx.arc(150, 150, 100, startAngle, startAngle + sliceAngle);
    ctx.closePath();
    ctx.fill();

    startAngle += sliceAngle;
  });
}
</script>

</body>
</html>

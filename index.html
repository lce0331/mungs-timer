<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>멍’s 타이머</title>

<style>
body {
  background: #ffd6e7;
  font-family: sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
}

#timer {
  font-size: 50px;
  margin: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

ul { list-style: none; padding: 0; }
</style>
</head>

<body>

<h1>🐶 멍’s 타이머</h1>

<select id="subject">
  <option>국어</option>
  <option>수학</option>
  <option>영어</option>
  <option>지구과학</option>
  <option>생명과학</option>
  <option>한국사</option>
  <option>인강</option>
  <option>플래너 작성</option>
</select>

<div id="timer">00:00:00</div>

<button onclick="start()">시작</button>
<button onclick="stop()">정지</button>
<button onclick="reset()">리셋</button>

<h2>📊 오늘 기록</h2>
<ul id="log"></ul>

<h2>총 공부시간: <span id="total">0</span>분</h2>

<script>

let startTime = null;
let timer = null;
let elapsed = 0;

function getToday() {
  return new Date().toISOString().split('T')[0];
}

let data = JSON.parse(localStorage.getItem("studyData")) || {};
let today = getToday();

if (!data[today]) data[today] = [];

renderAll();

function start() {
  if (timer) return;

  startTime = Date.now() - elapsed;

  timer = setInterval(() => {
    elapsed = Date.now() - startTime;
    updateTimer();
  }, 1000);
}

function stop() {
  if (!timer) return;

  clearInterval(timer);
  timer = null;

  let endTime = Date.now();

  // ⭐ 핵심 수정: elapsed 기반 계산
  let duration = Math.floor(elapsed / 60000);

  if (duration < 1) return;

  let subject = document.getElementById("subject").value;

  let record = {
    subject,
    start: new Date(startTime).toLocaleTimeString(),
    end: new Date(endTime).toLocaleTimeString(),
    duration
  };

  data[today].push(record);
  localStorage.setItem("studyData", JSON.stringify(data));

  renderAll();
}

function reset() {
  clearInterval(timer);
  timer = null;
  elapsed = 0;
  updateTimer();
}

function updateTimer() {
  let sec = Math.floor(elapsed / 1000);
  let h = String(Math.floor(sec / 3600)).padStart(2, '0');
  let m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  let s = String(sec % 60).padStart(2, '0');

  document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

function renderAll() {
  renderLog();
  updateTotal();
}

function renderLog() {
  let log = document.getElementById("log");
  log.innerHTML = "";

  data[today].forEach(r => {
    let li = document.createElement("li");
    li.innerText = `${r.start} ~ ${r.end} | ${r.subject} (${r.duration}분)`;
    log.appendChild(li);
  });
}

function updateTotal() {
  let total = 0;
  data[today].forEach(r => total += r.duration);
  document.getElementById("total").innerText = total;
}

</script>

</body>
</html>
